<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SwingEdge — India Options Toolkit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0D0F14;font-family:'DM Sans','Segoe UI',sans-serif;color:#C8D0E0;min-height:100vh}
  input[type=range]{height:4px;accent-color:#F0B429}
  select option{background:#13161E}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#0D0F14}
  ::-webkit-scrollbar-thumb{background:#1E2330;border-radius:3px}
  input,select,textarea{font-family:'DM Sans','Segoe UI',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState}=React;
const ACCENT="#F0B429",ACCENT2="#00C9A7",RED="#FF5A5F",BG="#0D0F14",CARD="#13161E",BORDER="#1E2330";
const fmt=n=>new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n);
const labelStyle={color:"#8891A4",fontSize:11,display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"};
const selectStyle={background:"#0A0C12",border:`1px solid ${BORDER}`,color:"#C8D0E0",borderRadius:8,padding:"7px 10px",fontSize:13,width:"100%",outline:"none"};
const inputStyle={background:"#0A0C12",border:`1px solid ${BORDER}`,color:"#C8D0E0",borderRadius:8,padding:"7px 10px",fontSize:13,width:"100%",outline:"none",boxSizing:"border-box"};
const tagStyle=c=>({background:`${c}20`,color:c,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600});
const riskColors={"Very Low":"#00C9A7","Low":"#4ADE80","Medium":ACCENT,"High":"#F87171"};

const strategies=[
  {view:"Strongly Bullish",vol:"Low IV",time:"1–2 weeks",strategy:"Long Call (ATM)",risk:"Low",reward:"High",desc:"Buy ATM call option. Simple directional bet when IV is cheap. Use when VIX < 15 and strong breakout confirmed.",color:"#00C9A7",icon:"🚀"},
  {view:"Moderately Bullish",vol:"Any IV",time:"1–3 weeks",strategy:"Bull Call Spread",risk:"Very Low",reward:"Medium",desc:"Buy ATM call + Sell OTM call same expiry. Reduced cost, defined max loss. Best swing trade strategy for beginners.",color:"#4ADE80",icon:"📈"},
  {view:"Strongly Bearish",vol:"Low IV",time:"1–2 weeks",strategy:"Long Put (ATM)",risk:"Low",reward:"High",desc:"Buy ATM put option. Directional bet on downside. Use when VIX is low and clear breakdown confirmed.",color:"#F87171",icon:"📉"},
  {view:"Moderately Bearish",vol:"Any IV",time:"1–3 weeks",strategy:"Bear Put Spread",risk:"Very Low",reward:"Medium",desc:"Buy ATM put + Sell OTM put. Capped loss and profit. Great for controlled bearish swing trades.",color:"#FB923C",icon:"🔻"},
  {view:"Range Bound",vol:"High IV",time:"Expiry week",strategy:"Iron Condor",risk:"Low",reward:"Medium",desc:"Sell OTM call & put, buy further OTM for hedge. Profit if market stays range-bound. Best when VIX > 20.",color:"#A78BFA",icon:"🦅"},
  {view:"Neutral / Sideways",vol:"High IV",time:"1–2 weeks",strategy:"Short Strangle (Hedged)",risk:"Medium",reward:"Medium",desc:"Sell OTM call + put. Collect premium if price stays flat. Always hedge with wing buys to cap max loss.",color:"#60A5FA",icon:"⚖️"},
  {view:"Breakout Expected",vol:"Low IV",time:"Event-driven",strategy:"Long Straddle",risk:"Low",reward:"High",desc:"Buy ATM call + ATM put same strike & expiry. Profit if big move either way. Use before earnings or budget.",color:ACCENT,icon:"⚡"},
  {view:"Bullish with Income",vol:"Any IV",time:"Monthly",strategy:"Covered Call",risk:"Very Low",reward:"Low",desc:"Hold stock + sell OTM call every expiry. Generate 1–3% monthly income on existing holdings.",color:"#34D399",icon:"💰"},
];

function StrategySelector(){
  const[view,setView]=useState("all");
  const[vol,setVol]=useState("all");
  const[selected,setSelected]=useState(null);
  const views=["all",...new Set(strategies.map(s=>s.view))];
  const vols=["all","Low IV","High IV","Any IV"];
  const filtered=strategies.filter(s=>(view==="all"||s.view===view)&&(vol==="all"||s.vol===vol||s.vol==="Any IV"));
  return(
    <div>
      <p style={{color:"#8891A4",marginBottom:20,fontSize:13}}>Select your market view and IV conditions to find the best strategy. Click any card for details.</p>
      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <div style={{minWidth:200}}>
          <label style={labelStyle}>Market View</label>
          <select value={view} onChange={e=>setView(e.target.value)} style={selectStyle}>
            {views.map(v=><option key={v} value={v}>{v==="all"?"All Views":v}</option>)}
          </select>
        </div>
        <div style={{minWidth:160}}>
          <label style={labelStyle}>IV Condition</label>
          <select value={vol} onChange={e=>setVol(e.target.value)} style={selectStyle}>
            {vols.map(v=><option key={v} value={v}>{v==="all"?"All IV":v}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
        {filtered.map(s=>(
          <div key={s.strategy} onClick={()=>setSelected(selected?.strategy===s.strategy?null:s)}
            style={{background:selected?.strategy===s.strategy?`${s.color}18`:"#0A0C12",border:`1px solid ${selected?.strategy===s.strategy?s.color:BORDER}`,borderRadius:12,padding:16,cursor:"pointer",transition:"all 0.2s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:22}}>{s.icon}</div>
                <div style={{color:s.color,fontWeight:700,fontSize:14,marginTop:6}}>{s.strategy}</div>
                <div style={{color:"#8891A4",fontSize:11,marginTop:2}}>{s.view}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{background:`${riskColors[s.risk]}22`,color:riskColors[s.risk],borderRadius:6,padding:"3px 8px",fontSize:11,marginBottom:4}}>Risk: {s.risk}</div>
                <div style={{color:"#8891A4",fontSize:11}}>⏱ {s.time}</div>
              </div>
            </div>
            {selected?.strategy===s.strategy&&(
              <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${BORDER}`}}>
                <p style={{color:"#C8D0E0",fontSize:13,lineHeight:1.6,margin:0}}>{s.desc}</p>
                <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}>
                  <span style={tagStyle("#4ADE80")}>Reward: {s.reward}</span>
                  <span style={tagStyle("#60A5FA")}>IV: {s.vol}</span>
                  <span style={tagStyle("#A78BFA")}>Hold: {s.time}</span>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
      {filtered.length===0&&<div style={{color:"#8891A4",textAlign:"center",padding:40}}>No strategies match. Try different filters.</div>}
    </div>
  );
}

function PositionSizer(){
  const[capital,setCapital]=useState(300000);
  const[riskPct,setRiskPct]=useState(2);
  const[premium,setPremium]=useState(150);
  const[lotSize,setLotSize]=useState(25);
  const[slPct,setSlPct]=useState(35);
  const maxRiskAmt=(capital*riskPct)/100;
  const costPerLot=premium*lotSize;
  const slLossPerLot=costPerLot*(slPct/100);
  const maxLots=slLossPerLot>0?Math.floor(maxRiskAmt/slLossPerLot):0;
  const capitalRequired=maxLots*costPerLot;
  const capitalPct=((capitalRequired/capital)*100).toFixed(1);
  const slPrice=(premium*(1-slPct/100)).toFixed(0);
  return(
    <div>
      <p style={{color:"#8891A4",marginBottom:20,fontSize:13}}>Never risk more than 1–2% per trade. Enter your trade details to get exact lot count.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
        {[
          {label:"Total Capital (₹)",val:capital,set:setCapital,min:50000,max:2000000,step:10000,display:fmt(capital)},
          {label:"Risk Per Trade (%)",val:riskPct,set:setRiskPct,min:0.5,max:5,step:0.5,display:`${riskPct}%`},
          {label:"Option Premium (₹)",val:premium,set:setPremium,min:10,max:2000,step:5,display:`₹${premium}`},
          {label:"Lot Size",val:lotSize,set:setLotSize,min:1,max:1500,step:1,display:lotSize},
          {label:"Stop Loss (%)",val:slPct,set:setSlPct,min:10,max:60,step:5,display:`${slPct}%`},
        ].map(({label,val,set,min,max,step,display})=>(
          <div key={label}>
            <label style={labelStyle}>{label}</label>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="range" min={min} max={max} step={step} value={val} onChange={e=>set(Number(e.target.value))} style={{flex:1}}/>
              <span style={{color:ACCENT,fontWeight:700,minWidth:70,textAlign:"right",fontSize:13}}>{display}</span>
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:12}}>
        {[
          {label:"Max Risk Amount",val:fmt(maxRiskAmt),color:RED},
          {label:"Cost Per Lot",val:fmt(costPerLot),color:"#60A5FA"},
          {label:"SL Loss / Lot",val:fmt(slLossPerLot),color:"#FB923C"},
          {label:"✅ Max Lots to Buy",val:maxLots>0?maxLots:0,color:ACCENT,big:true},
          {label:"Capital Deployed",val:fmt(capitalRequired),color:ACCENT2},
          {label:"% of Capital Used",val:`${capitalPct}%`,color:"#A78BFA"},
        ].map(({label,val,color,big})=>(
          <div key={label} style={{background:"#0A0C12",border:`1px solid ${BORDER}`,borderRadius:12,padding:16}}>
            <div style={{color:"#8891A4",fontSize:11,marginBottom:6}}>{label}</div>
            <div style={{color,fontSize:big?30:15,fontWeight:700}}>{val}</div>
          </div>
        ))}
      </div>
      {maxLots===0?
        <div style={{marginTop:16,background:`${RED}15`,border:`1px solid ${RED}`,borderRadius:10,padding:14,color:RED,fontSize:13}}>⚠️ Premium too high for your risk budget. Reduce premium, increase capital, or raise risk %.</div>:
        <div style={{marginTop:16,background:`${ACCENT2}12`,border:`1px solid ${ACCENT2}40`,borderRadius:10,padding:14,color:ACCENT2,fontSize:13}}>
          ✅ Buy <strong>{maxLots} lot{maxLots>1?"s":""}</strong>. Set stop loss at ₹{slPrice} (−{slPct}% from entry). Max loss = <strong>{fmt(maxRiskAmt)}</strong>.
        </div>
      }
    </div>
  );
}

function PayoffCalculator(){
  const[legs,setLegs]=useState([
    {type:"CE",action:"BUY",strike:22500,premium:150,lots:1,lotSize:25},
    {type:"CE",action:"SELL",strike:22800,premium:60,lots:1,lotSize:25},
  ]);
  const[spot,setSpot]=useState(22500);
  const addLeg=()=>setLegs([...legs,{type:"CE",action:"BUY",strike:22500,premium:100,lots:1,lotSize:25}]);
  const removeLeg=i=>setLegs(legs.filter((_,idx)=>idx!==i));
  const updateLeg=(i,key,val)=>setLegs(legs.map((l,idx)=>idx===i?{...l,[key]:val}:l));
  const minSpot=Math.min(...legs.map(l=>l.strike))-1000;
  const maxSpot=Math.max(...legs.map(l=>l.strike))+1000;
  const points=[];
  for(let s=minSpot;s<=maxSpot;s+=50){
    let pnl=0;
    legs.forEach(l=>{
      const intr=l.type==="CE"?Math.max(0,s-l.strike):Math.max(0,l.strike-s);
      const lp=(intr-l.premium)*l.lots*l.lotSize;
      pnl+=l.action==="BUY"?lp:-lp;
    });
    points.push({s,pnl});
  }
  const atSpotPnl=points.reduce((b,p)=>Math.abs(p.s-spot)<Math.abs(b.s-spot)?p:b).pnl;
  const maxProfit=Math.max(...points.map(p=>p.pnl));
  const maxLoss=Math.min(...points.map(p=>p.pnl));
  const breakevens=[];
  for(let i=1;i<points.length;i++){
    if((points[i-1].pnl<0&&points[i].pnl>=0)||(points[i-1].pnl>=0&&points[i].pnl<0))
      breakevens.push(Math.round((points[i-1].s+points[i].s)/2));
  }
  const W=500,H=200,padL=65,padR=20,padT=20,padB=35;
  const cW=W-padL-padR,cH=H-padT-padB;
  const minPnl=Math.min(maxLoss,-500),maxPnl=Math.max(maxProfit,500);
  const pnlR=maxPnl-minPnl||1,sR=maxSpot-minSpot||1;
  const toX=s=>padL+((s-minSpot)/sR)*cW;
  const toY=p=>padT+((maxPnl-p)/pnlR)*cH;
  const zY=toY(0);
  const pathD=points.map((p,i)=>`${i===0?"M":"L"}${toX(p.s).toFixed(1)},${toY(p.pnl).toFixed(1)}`).join(" ");
  const fillD=`${pathD} L${toX(maxSpot)},${zY} L${toX(minSpot)},${zY} Z`;
  return(
    <div>
      <p style={{color:"#8891A4",marginBottom:20,fontSize:13}}>Build multi-leg strategies and visualize P&L at expiry. Drag spot slider to simulate scenarios.</p>
      <div style={{marginBottom:20}}>
        {legs.map((l,i)=>(
          <div key={i} style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:12,flexWrap:"wrap",background:"#0A0C12",padding:12,borderRadius:10,border:`1px solid ${BORDER}`}}>
            <span style={{color:"#8891A4",fontSize:12,paddingBottom:6}}>Leg {i+1}</span>
            {[{key:"action",opts:["BUY","SELL"]},{key:"type",opts:["CE","PE"]}].map(({key,opts})=>(
              <div key={key}>
                <label style={{...labelStyle,marginBottom:3}}>{key}</label>
                <select value={l[key]} onChange={e=>updateLeg(i,key,e.target.value)} style={{...selectStyle,width:80}}>
                  {opts.map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
            ))}
            {[{key:"strike",label:"Strike",w:90},{key:"premium",label:"Premium ₹",w:85},{key:"lots",label:"Lots",w:60},{key:"lotSize",label:"Lot Size",w:70}].map(({key,label,w})=>(
              <div key={key}>
                <label style={{...labelStyle,marginBottom:3}}>{label}</label>
                <input type="number" value={l[key]} onChange={e=>updateLeg(i,key,Number(e.target.value))} style={{...inputStyle,width:w}}/>
              </div>
            ))}
            {legs.length>1&&<button onClick={()=>removeLeg(i)} style={{background:`${RED}20`,border:`1px solid ${RED}`,color:RED,borderRadius:6,padding:"6px 10px",cursor:"pointer",marginBottom:1}}>✕</button>}
          </div>
        ))}
        <button onClick={addLeg} style={{background:`${ACCENT}15`,border:`1px dashed ${ACCENT}`,color:ACCENT,borderRadius:8,padding:"8px 18px",cursor:"pointer",fontSize:13}}>+ Add Leg</button>
      </div>
      <div style={{background:"#0A0C12",border:`1px solid ${BORDER}`,borderRadius:12,padding:16,marginBottom:16,overflowX:"auto"}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block"}}>
          <line x1={padL} y1={zY} x2={W-padR} y2={zY} stroke="#2A3040" strokeWidth={1}/>
          <path d={fillD} fill={`${ACCENT2}18`}/>
          <path d={pathD} fill="none" stroke={ACCENT2} strokeWidth={2.5}/>
          <line x1={toX(spot)} y1={padT} x2={toX(spot)} y2={H-padB} stroke={ACCENT} strokeWidth={1.5} strokeDasharray="4,3"/>
          {[maxPnl,0,minPnl].map(v=>(
            <text key={v} x={padL-6} y={toY(v)+4} textAnchor="end" fill="#8891A4" fontSize={10}>
              {v>=0?`+${(v/1000).toFixed(0)}k`:`${(v/1000).toFixed(0)}k`}
            </text>
          ))}
          {[minSpot,spot,maxSpot].map(v=>(
            <text key={v} x={toX(v)} y={H-6} textAnchor="middle" fill="#8891A4" fontSize={10}>{v}</text>
          ))}
          <text x={toX(spot)+6} y={padT+14} fill={ACCENT} fontSize={10}>▲ Spot: {spot}</text>
        </svg>
      </div>
      <div style={{marginBottom:20}}>
        <label style={labelStyle}>Simulate Spot Price</label>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <input type="range" min={minSpot} max={maxSpot} step={50} value={spot} onChange={e=>setSpot(Number(e.target.value))} style={{flex:1}}/>
          <input type="number" value={spot} onChange={e=>setSpot(Number(e.target.value))} style={{...inputStyle,width:100}}/>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12}}>
        {[
          {label:"P&L at Spot",val:fmt(atSpotPnl),color:atSpotPnl>=0?ACCENT2:RED},
          {label:"Max Profit",val:maxProfit>1e6?"Unlimited":fmt(maxProfit),color:ACCENT2},
          {label:"Max Loss",val:maxLoss<-1e6?"Unlimited":fmt(maxLoss),color:RED},
          {label:"Breakeven(s)",val:breakevens.length?breakevens.join(", "):"None",color:ACCENT},
        ].map(({label,val,color})=>(
          <div key={label} style={{background:"#0A0C12",border:`1px solid ${BORDER}`,borderRadius:12,padding:14}}>
            <div style={{color:"#8891A4",fontSize:11,marginBottom:6}}>{label}</div>
            <div style={{color,fontSize:15,fontWeight:700}}>{val}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

const JOURNAL_KEY="swingEdge_trades_v1";

function TradeJournal(){
  const[trades,setTrades]=useState(()=>{try{return JSON.parse(localStorage.getItem(JOURNAL_KEY)||"[]")}catch{return[]}});
  const[form,setForm]=useState({date:new Date().toISOString().split("T")[0],symbol:"",strategy:"Bull Call Spread",direction:"BULLISH",premium:"",exitPremium:"",lots:1,lotSize:25,status:"OPEN",notes:""});
  const[showForm,setShowForm]=useState(false);
  const[filter,setFilter]=useState("ALL");
  const save=updated=>{setTrades(updated);try{localStorage.setItem(JOURNAL_KEY,JSON.stringify(updated))}catch{}};
  const addTrade=()=>{
    if(!form.symbol||!form.premium)return;
    const pnl=form.status==="CLOSED"?(Number(form.exitPremium)-Number(form.premium))*form.lots*form.lotSize*(form.direction==="BEARISH"?-1:1):null;
    save([{...form,id:Date.now(),pnl},...trades]);
    setForm({...form,symbol:"",notes:"",premium:"",exitPremium:"",status:"OPEN"});
    setShowForm(false);
  };
  const deleteTrade=id=>save(trades.filter(t=>t.id!==id));
  const filtered=filter==="ALL"?trades:trades.filter(t=>t.status===filter);
  const closed=trades.filter(t=>t.status==="CLOSED"&&t.pnl!==null);
  const totalPnl=closed.reduce((a,t)=>a+(t.pnl||0),0);
  const wins=closed.filter(t=>t.pnl>0).length;
  const winRate=closed.length?((wins/closed.length)*100).toFixed(0):0;
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:12,marginBottom:20}}>
        {[
          {label:"Total Trades",val:trades.length,color:"#60A5FA"},
          {label:"Open Trades",val:trades.filter(t=>t.status==="OPEN").length,color:ACCENT},
          {label:"Win Rate",val:`${winRate}%`,color:ACCENT2},
          {label:"Total P&L",val:fmt(totalPnl),color:totalPnl>=0?ACCENT2:RED},
        ].map(({label,val,color})=>(
          <div key={label} style={{background:"#0A0C12",border:`1px solid ${BORDER}`,borderRadius:12,padding:14}}>
            <div style={{color:"#8891A4",fontSize:11,marginBottom:6}}>{label}</div>
            <div style={{color,fontSize:18,fontWeight:700}}>{val}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={()=>setShowForm(!showForm)} style={{background:`${ACCENT}20`,border:`1px solid ${ACCENT}`,color:ACCENT,borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>
          {showForm?"✕ Cancel":"+ Log Trade"}
        </button>
        {["ALL","OPEN","CLOSED","SL HIT"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?`${ACCENT2}20`:"transparent",border:`1px solid ${filter===f?ACCENT2:BORDER}`,color:filter===f?ACCENT2:"#8891A4",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:12}}>{f}</button>
        ))}
      </div>
      {showForm&&(
        <div style={{background:"#0A0C12",border:`1px solid ${ACCENT}40`,borderRadius:14,padding:20,marginBottom:20}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12,marginBottom:14}}>
            {[
              {key:"date",label:"Date",type:"date"},
              {key:"symbol",label:"Symbol",type:"text",placeholder:"NIFTY / RELIANCE"},
              {key:"premium",label:"Entry Premium ₹",type:"number"},
              {key:"exitPremium",label:"Exit Premium ₹",type:"number"},
              {key:"lots",label:"Lots",type:"number"},
              {key:"lotSize",label:"Lot Size",type:"number"},
            ].map(({key,label,type,placeholder})=>(
              <div key={key}>
                <label style={labelStyle}>{label}</label>
                <input type={type} placeholder={placeholder||""} value={form[key]} onChange={e=>setForm({...form,[key]:e.target.value})} style={inputStyle}/>
              </div>
            ))}
            {[
              {key:"strategy",label:"Strategy",opts:["Bull Call Spread","Bear Put Spread","Long Call","Long Put","Iron Condor","Long Straddle","Covered Call","Other"]},
              {key:"direction",label:"Direction",opts:["BULLISH","BEARISH","NEUTRAL"]},
              {key:"status",label:"Status",opts:["OPEN","CLOSED","SL HIT"]},
            ].map(({key,label,opts})=>(
              <div key={key}>
                <label style={labelStyle}>{label}</label>
                <select value={form[key]} onChange={e=>setForm({...form,[key]:e.target.value})} style={selectStyle}>
                  {opts.map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
            ))}
          </div>
          <div style={{marginBottom:12}}>
            <label style={labelStyle}>Notes / Setup Reason</label>
            <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Setup reason, key levels, what confirmed the trade..." style={{...inputStyle,width:"100%",height:64,resize:"vertical"}}/>
          </div>
          <button onClick={addTrade} style={{background:ACCENT2,border:"none",color:"#000",borderRadius:8,padding:"10px 24px",cursor:"pointer",fontSize:13,fontWeight:700}}>Save Trade</button>
        </div>
      )}
      {filtered.length===0?(
        <div style={{color:"#8891A4",textAlign:"center",padding:40,fontSize:13}}>
          {trades.length===0?"No trades yet. Click '+ Log Trade' to start your journal.":"No trades match this filter."}
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(t=>{
            const dc=t.direction==="BULLISH"?ACCENT2:t.direction==="BEARISH"?RED:ACCENT;
            const sc=t.status==="OPEN"?ACCENT:t.status==="CLOSED"?"#4ADE80":RED;
            return(
              <div key={t.id} style={{background:"#0A0C12",border:`1px solid ${BORDER}`,borderRadius:12,padding:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
                      <span style={{color:"#fff",fontWeight:700,fontSize:15}}>{t.symbol}</span>
                      <span style={tagStyle(dc)}>{t.direction}</span>
                      <span style={tagStyle(sc)}>{t.status}</span>
                      <span style={tagStyle("#8891A4")}>{t.strategy}</span>
                    </div>
                    <div style={{color:"#8891A4",fontSize:12,marginBottom:2}}>{t.date} · Entry: ₹{t.premium} · {t.lots} lot{t.lots>1?"s":""} × {t.lotSize}</div>
                    {t.exitPremium&&<div style={{color:"#8891A4",fontSize:12}}>Exit: ₹{t.exitPremium}</div>}
                    {t.notes&&<div style={{color:"#6B7280",fontSize:12,marginTop:4,fontStyle:"italic"}}>{t.notes}</div>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    {t.pnl!==null&&<div style={{color:t.pnl>=0?ACCENT2:RED,fontSize:20,fontWeight:700}}>{fmt(t.pnl)}</div>}
                    {t.status==="OPEN"&&<div style={{color:"#8891A4",fontSize:11,marginBottom:4}}>Position Open</div>}
                    <button onClick={()=>deleteTrade(t.id)} style={{background:"transparent",border:`1px solid ${BORDER}`,color:"#4B5563",cursor:"pointer",fontSize:11,borderRadius:6,padding:"3px 8px"}}>Delete</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

const tabs=[
  {id:"strategy",label:"Strategy Selector",icon:"🎯"},
  {id:"sizer",label:"Position Sizer",icon:"⚖️"},
  {id:"payoff",label:"Payoff Chart",icon:"📊"},
  {id:"journal",label:"Trade Journal",icon:"📓"},
];

function App(){
  const[tab,setTab]=useState("strategy");
  return(
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:BG,minHeight:"100vh",color:"#C8D0E0"}}>
      <div style={{background:CARD,borderBottom:`1px solid ${BORDER}`,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:9,height:9,borderRadius:"50%",background:ACCENT2,boxShadow:`0 0 10px ${ACCENT2}`}}/>
          <span style={{color:"#fff",fontWeight:700,fontSize:18,letterSpacing:"-0.02em"}}>SwingEdge</span>
          <span style={{color:"#8891A4",fontSize:12}}>India Options Toolkit</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{background:`${ACCENT}20`,color:ACCENT,borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:600}}>NSE / BSE</span>
          <span style={{background:"#1E2330",color:"#8891A4",borderRadius:6,padding:"3px 10px",fontSize:11}}>⚠️ Educational Only</span>
        </div>
      </div>
      <div style={{background:CARD,borderBottom:`1px solid ${BORDER}`,padding:"0 16px",display:"flex",gap:2,overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"transparent",border:"none",borderBottom:`2px solid ${tab===t.id?ACCENT:"transparent"}`,color:tab===t.id?ACCENT:"#8891A4",padding:"13px 16px",cursor:"pointer",fontSize:13,fontWeight:tab===t.id?600:400,whiteSpace:"nowrap",fontFamily:"inherit",transition:"color 0.2s"}}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>
      <div style={{maxWidth:880,margin:"0 auto",padding:"24px 16px"}}>
        {tab==="strategy"&&<StrategySelector/>}
        {tab==="sizer"&&<PositionSizer/>}
        {tab==="payoff"&&<PayoffCalculator/>}
        {tab==="journal"&&<TradeJournal/>}
      </div>
      <div style={{textAlign:"center",padding:"16px",color:"#374151",fontSize:11,borderTop:`1px solid ${BORDER}`}}>
        ⚠️ For educational purposes only. Not SEBI-registered investment advice. Options trading involves substantial risk of loss.
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
